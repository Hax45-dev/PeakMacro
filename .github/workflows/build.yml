name: Build Geode Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android32
            os: ubuntu-latest
            target: Android32
          - name: Android64
            os: ubuntu-latest
            target: Android64
          - name: Windows
            os: windows-latest
            target: Win

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}

  package:
    name: Package Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main

      - uses: actions/upload-artifact@v4
        with:
          name: PeakMacro-Release
          path: build/*.geode
